<head>

    <title>منصة المراجعة النهائية | 2026</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --primary-comm: #2980b9;
            --primary-hr: #c0392b;
            --text-main: #2c3e50;
            --accent: #27ae60;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .theme-btn {
            background: var(--bg-card);
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-main);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            background: #ddd;
        }

        .tab-btn.active-comm { background: var(--primary-comm); color: white; }
        .tab-btn.active-hr { background: var(--primary-hr); color: white; }

        .search-box {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
            background: var(--bg-card);
            color: var(--text-main);
        }

        .qa-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-right: 5px solid #ccc;
        }

        .comm-border { border-right-color: var(--primary-comm); }
        .hr-border { border-right-color: var(--primary-hr); }

        .question { font-weight: 600; line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; }
        .answer { 
            color: var(--accent); 
            font-weight: bold; 
            padding: 10px; 
            background: rgba(39, 174, 96, 0.1); 
            border-radius: 8px; 
        }

        .counter { font-size: 0.9rem; margin-top: 5px; font-weight: bold; opacity: 0.8; }

        .note {
            color: var(--primary-comm);
            font-size: 0.95rem;
            margin-top: 10px;
            background: rgba(41, 128, 185, 0.08);
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid var(--primary-comm);
        }
    </style>

    let currentMode = 'org';
    const contentDiv = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');
    const countDisplay = document.getElementById('countDisplay');

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('orgTab').className = mode === 'org' ? 'tab-btn active-comm' : 'tab-btn';
        document.getElementById('basicTab').className = mode === 'basic' ? 'tab-btn active-comm' : 'tab-btn';
        searchInput.value = '';
        render();
    }

    function render() {
        const data = currentMode === 'org' ? orgData : basicData;
        const term = searchInput.value.toLowerCase();
        const filtered = data.filter(item => item.q.toLowerCase().includes(term));
        
        countDisplay.innerText = `عدد الأسئلة: ${filtered.length}`;
        contentDiv.innerHTML = '';

        if (filtered.length === 0 && data.length === 0) {
            contentDiv.innerHTML = '<div style="text-align: center; padding: 40px; color: #999; font-size: 1.2rem;">هذه المادة سيتم إضافة أسئلتها قريباً 📝</div>';
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'qa-card comm-border';
            card.innerHTML = `
                <div class="question">${item.q}</div>
            `;
            if (item.a) {
                card.innerHTML += `<div class="answer">الاجابة: ${item.a}</div>`;
            }
            if (item.note) {
                card.innerHTML += `<div class="note">${item.note}</div>`;
            }
            contentDiv.appendChild(card);
        });
    }

    searchInput.addEventListener('input', render);
    
    document.getElementById('themeToggle').addEventListener('click', () => {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeToggle').innerText = isDark ? 'الوضع الليلي 🌙' : 'الوضع النهاري ☀️';
    });

    render();
</script>
