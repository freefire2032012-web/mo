<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حل ينجم </title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --primary-color: #4a90e2;
            --text-main: #2c3e50;
            --text-sub: #555;
            --accent-color: #27ae60;
        }

        [data-theme="dark"] {
            --bg-body: #1a1a2e;
            --bg-card: #16213e;
            --primary-color: #4cc9f0;
            --text-main: #e9ecef;
            --text-sub: #adb5bd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 1.5rem; }

        /* زر وضع الليل */
        .theme-toggle {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .qa-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-right: 6px solid var(--primary-color);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .answer-container {
            display: none; /* مخفي افتراضياً */
            padding: 10px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 8px;
            color: var(--accent-color);
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-show {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-show:hover { opacity: 0.9; }

        .no-results { text-align: center; color: #e74c3c; margin-top: 50px; }

        .footer-info {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚀 علوم سياسية </h1>
        <button class="theme-toggle" id="themeToggle">الوضع الليلي 🌙</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث بكلمة من السؤال...">
        <div style="font-size: 0.8rem; margin-top: 8px; color: var(--text-sub);" id="counter"></div>
    </div>

    <div id="results"></div>

    <div class="footer-info">
        كل الحقوق محفوظة لبرنامجك الخاص 2026
    </div>
</div>

<script>
    // الأسئلة الجديدة بكامل تفاصيلها
    const data = [

        { q: "المحاضره الاولي - 3- تعد السلطة السياسية عامة وتلزم كل المجتمع", a: "صح" },
        { q: "المحاضره الاولي - 4- تعد كلمة فلسفة وفكر كلمتان مترادفتان", a: "صح" },
        { q: "المحاضره الاولي - 5- تتفق الفلسفة السياسية و علم السياسة", a: "خطأ" },
        { q: "المحاضره الاولي - 6- ظهرت الفلسفة السياسية فى أهم بلاد الغرب القديم", a: "خطأ" },
        { q: "المحاضره الاولي - 7- بدأت فترة العصور الوسطى بظهور الدين المسيحى", a: "صح" },
        { q: "المحاضره الاولي - 8- نشأت الدولة الإقطاعية فى المرحلة الخامسة من تطور الدولة التاريخى", a: "صح" },
        { q: "المحاضره الاولي - 9- ارتبط عصر النهضة بقيام الدولة القومية", a: "صح" },
        { q: "المحاضره الاولي - 10- جاء الدين الاسلامى على يد خاتم الانبياء سيدنا محمد صل الله عليه وسلم لينظم حياة الإنسان", a: "صح" },
        { q: "المحاضره الاولي - سؤال ثاني/1- ظهرت فى العصور......... مجموعة من الأفكار و الفلسفات القائمة على ما سبقتهافى العصور السابقة", a: "ج - الحديثة" },
        { q: "المحاضره الاولي - سؤال ثاني/2- تبدأ فترة العصور......... منذ بداية القرن العشرين وتستمر حتى الآن", a: "د- المعاصرة" },
        { q: "المحاضره الاولي - سؤال ثاني/3- تبدأ العصور......... بسقوط روما وزوال الامبراطورية الرومانية الغربية على يدالقبائل الجرمانية عام 476 م", a: "ب - الوسطى" },
        { q: "المحاضره الاولي - سؤال ثاني/4- تنتهى العصور......... بسقوط القسطنطينية عاصمة الامبراطورية الرومانية الشرقيةعلى يد الأتراك المسلمين العثمانيين", a: "ب - الوسطى" },
        { q: "المحاضره الاولي - سؤال ثاني/5- تنقسم دراسة الفكر السياسى فى العصور......... إلى ثلاثة أقسام رئيسة", a: "أ- القديمة" },
        { q: "المحاضره الاولي - سؤال ثاني/6- عرف .......... علم السياسة بأن علم السياسة هو دراسة عملية التوزيع السلطوىللقيم المختلفة من أجل المجتمع", a: "أ- ديفيد إيستون" },
        { q: "المحاضره الاولي - سؤال ثاني/7- عرف ......... علم السياسة بأنه دراسة النفوذ و أصحاب النفوذ أو دراسة السلطة التى تحدد من يحصل على ماذا", a: "د-  هارولد لاسويل" },
        { q: "المحاضره الاولي - سؤال ثاني/8- ......... هو عبارة عن مجموعة من المبادئ و القواعد التى أثبتت التجربة صحتها", a: "ب- العلم" },
        { q: "المحاضره الاولي - سؤال ثاني/9- ......... من الناحية اللغوية هو شئ يتعلق بالشؤون العامة للبشر", a: "ب- السياسة" },
        { q: "المحاضره الاولي - سؤال ثاني/10- تعريف .......... القدرة على جعل المحكوم يعمل أو لا يعمل أشياء محددة سواء أراد أم لم يرد المحكوم ذلك", a: "ب- السلطة السياسة" },
        { q: "المحاضره الثانيه - 1- يعد أساس الدولة عنصر السكان", a: "صح" },
        { q: "المحاضره الثانيه - 2- غاب عن الدولة الحديثة فى العصور المعاصرة التجانس بين السكان", a: "خطأ" },
        { q: "المحاضره الثانيه - 3- تعد الولايات المتحدة الأمريكية نموذج للقومية القائمة على فكرة المصالح المتعددة و التى ظهرت فى شكل دولة فيدرالية", a: "صح" },
        { q: "المحاضره الثانيه - 4- لا ترتبط الدولة ذات السيادة بحق الأمة فى تقرير المصير", a: "خطأ" },
        { q: "المحاضره الثانيه - 5- يمثل الإقليم بما يملكه من موقع استراتيجى أن يصبح قوة اقتصادية فى المجال الدولى", a: "خطأ" },
        { q: "المحاضره الثانيه - سؤال ثاني/1- يمثل قانون الجنسية و القانون الدولى الخاص أحد عناصر الدولة وهو ..........", a: "ب- المواطنون" },
        { q: "المحاضره الثانيه - سؤال ثاني/2- ......... هو كامل مساحة الأرض التى تتبع الدولة ويقيم عليها أو على بعضها أو معظمها مواطنيها", a: "أ- الإقليم" },
        { q: "المحاضره الثانيه - سؤال ثاني/3- ......... هى السلطة العليا العامة فى المجتمع بفروعها الثلاث التشريع و التنفيذ و القضاء", a: "ج- الحكومة" },
        { q: "المحاضره الثانيه - سؤال ثاني/4- يعرف ......... بأنه الحكومة وكل ما يرتبط بها من تنظيمات تسهم بشكل أو بآخر فى صناعة القرارات أو فى ممارسة السلطة", a: "ج- النظام السياسى" },
        { q: "المحاضره الثانيه - سؤال ثاني/5- يوجد ارتباط بين مفهوم السيادة و.........", a: "د – الإستقلال" },
        { q: "المحاضره الثالثه - 1- تتعدد أنواع الدول عبر العالم وتاريخيا", a: "صح" },
        { q: "المحاضره الثالثه - 2- الدولة البسيطة أو الدولة الموحدة Unitary هى الدولة المفردة ذات الهوية الواحدةو التى يتوحد فيها مركز السلطة و لا يتعدد", a: "صح" },
        { q: "المحاضره الثالثه - 3- الدولة المركبة أو الاتحادية الدولة المكونة من عدة دويلات أو ولايات", a: "صح" },
        { q: "المحاضره الثالثه - 4- تعد مصر شكل من أشكال الدول المركبة", a: "خطأ" },
        { q: "المحاضره الثالثه - 5- تعد الدولة الفيدرالية أحد أشكال الدول البسيطة", a: "خطأ" },
        { q: "المحاضره الثالثه - سؤال ثاني/1- ......... عبارة عن اجتماع دولتين تحت رئاسة صاحب عرش واحد مع احتفاظ كل دولة باستقلالها داخليا و خارجيا وبقاءها كدولة", a: "أ- الاتحاد الشخصى" },
        { q: "المحاضره الثالثه - سؤال ثاني/2- ......... عبارة عن جمع رئاسة دولتين أو أكثر فى شخص واحد ، مع إدارة بعض شؤونهاالمشتركة من خلال هيئات مشتركة", a: "ب- الاتحاد الحقيقى" },
        { q: "المحاضره الثالثه - سؤال ثاني/3- ......... اتحاد يتكون من مجموعة من الدول تتفق فيما بينها بمقتضى معاهدة دولية علىإقامة هيئة مشتركة", a: "ج- الاتحاد الكونفدرالى" },
        { q: "المحاضره الثالثه - سؤال ثاني/4- .......... عبارة عن دولة واحدة مكونة من ولايات أعضاء متحدة فى ظل دستور عام", a: "ج - الاتحاد الفيدرالى" },
        { q: "المحاضره الثالثه - سؤال ثاني/5- ينقسم التشريع ......... فى الدولة الفيدرالية عادة من مجلسين", a: "أ- الفيدرالى" },
        { q: "المحاضره الرابعه - 1- يمر النظام السياسى بفترة نشاط وقوة وحركية كما أنه في نفس الوقت يمر بفتراتالتأزم وربما السقوط إذا لم يتمكن من حماية نفسه", a: "صح" },
        { q: "المحاضره الرابعه - 2- يتحرك النظام السياسي عبر أربع مستويات", a: "خطأ" },
        { q: "المحاضره الرابعه - 3- يقصد بالديمقراطية أنها شكل من أشكال الحكم يشارك فيها جميع المواطنين المؤهلينعلى قدم المساواة", a: "صح" },
        { q: "المحاضره الرابعه - 4- تتضمن الديمقراطية الأوضاع الاجتماعية والاقتصادية والثقافية التي تمكن المواطنينمن الممارسة الحرة والمتساوية", a: "صح" },
        { q: "المحاضره الرابعه - 5- مصطلح ديمقراطية مشتق من المصطلح الفارسى و يعنى حكم الشعب لنفسه", a: "خطأ" },
        { q: "المحاضره الرابعه - سؤال ثاني/1- يتم اتخاذ القرار فى مرحلة ..........", a: "أ- صنع القرار" },
        { q: "المحاضره الرابعه - سؤال ثاني/2- فى مرحلة ......... ينوط بالحكومة وضع آليات تنفيذ القرار", a: "ب- تنفيذ القرار" },
        { q: "المحاضره الرابعه - سؤال ثاني/3- ......... يعتبر أحد المظاهر التي تجعل النظام السياسي يمتلك المصداقية", a: "ب- تنفيذ القرار" },
        { q: "المحاضره الرابعه - سؤال ثاني/4- يطلق على ......... بالجهاز الإعلامي", a: "ج - تسويق القرار" },
        { q: "المحاضره الرابعه - سؤال ثاني/5- من خصائص .......... أن يتمتع كل المواطنين المؤهلين بالمشاركة المباشرة والفعالةفي صنع القرار", a: "أ- الديمقراطية المباشرة" }
    ];

    const resultsContainer = document.getElementById('results');
    const searchInput = document.getElementById('searchInput');
    const counter = document.getElementById('counter');
    const themeToggle = document.getElementById('themeToggle');

    // تبديل الثيم
    themeToggle.addEventListener('click', () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeToggle.innerText = isDark ? 'الوضع الليلي 🌙' : 'الوضع النهاري ☀️';
    });

    function normalize(text) {
        return text.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').toLowerCase();
    }

    function render(list) {
        resultsContainer.innerHTML = '';
        counter.innerText = `عدد الأسئلة المعروضة: ${list.length}`;
        
        if(list.length === 0) {
            resultsContainer.innerHTML = `<div class="no-results">❌ مفيش سؤال بالاسم ده.. جرب كلمة تانية</div>`;
            return;
        }

        list.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'qa-card';

            let answer = item.a || 'غير محددة';
            if (answer.trim() === 'صح') {
                answer = '✅ صح';
            } else if (answer.trim() === 'خطأ') {
                answer = '❌ خطأ';
            }

            card.innerHTML = `
                <div class="question">${item.q}</div>
                <div class="answer-container" style="display:block;">${answer}</div>
            `;
            resultsContainer.appendChild(card);
        });
    }

    // لا حاجة لزر الإظهار/الإخفاء بعد الآن

    searchInput.addEventListener('input', (e) => {
        const val = normalize(e.target.value);
        const filtered = data.filter(item => normalize(item.q).includes(val));
        render(filtered);
    });

    // تشغيل أول مرة
    render(data);
</script>

</body>
</html>
