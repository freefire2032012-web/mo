<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حل ينجم </title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --primary-color: #4a90e2;
            --text-main: #2c3e50;
            --text-sub: #555;
            --accent-color: #27ae60;
        }

        [data-theme="dark"] {
            --bg-body: #1a1a2e;
            --bg-card: #16213e;
            --primary-color: #4cc9f0;
            --text-main: #e9ecef;
            --text-sub: #adb5bd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 1.5rem; }

        /* زر وضع الليل */
        .theme-toggle {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .qa-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-right: 6px solid var(--primary-color);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .answer-container {
            display: none; /* مخفي افتراضياً */
            padding: 10px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 8px;
            color: var(--accent-color);
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-show {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-show:hover { opacity: 0.9; }

        .no-results { text-align: center; color: #e74c3c; margin-top: 50px; }

        .footer-info {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚀 مراجعه </h1>
        <button class="theme-toggle" id="themeToggle">الوضع الليلي 🌙</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث بكلمة من السؤال... (مثال: الشق الأيمن)">
        <div style="font-size: 0.8rem; margin-top: 8px; color: var(--text-sub);" id="counter"></div>
    </div>

    <div id="results"></div>

    <div class="footer-info">
        كل الحقوق محفوظة لبرنامجك الخاص 2026
    </div>
</div>

<script>
    // الأسئلة الجديدة المضافة حرفياً
    const data = [
        { q: "المحاضره الاولي - 1- ليس هناك ضرورة كبيرة لتحليل ودراسة السلوك الإنساني ) x ( .", a: "خطأ" },
        { q: "المحاضره الاولي - 2- السلوك الإنساني يقصد به كافه التصرفات والأفعال التي تصدر من الفرد .", a: "صح" },
        { q: "المحاضره الاولي - 3- دراسة المدير لسلوك المرؤوسين لا تساعده في فهم السلوك الشاذ الذي يسود بعض العاملين )x( .", a: "خطأ" },
        { q: "المحاضره الاولي - 4- تهدف دراسة السلوك التنظيمي إلي فهم الأبعاد النفسية والسلوكية والاجتماعية للإنسان بصفة عامة في المنظمة .", a: "صح" },
        { q: "المحاضره الاولي - 5- السلوك التنظيمي يعد دعامة أساسية لنجاح أي منظمة .", a: "صح" },
        { q: "سؤال ثاني/1- تنسب نظرية العلاقات الإنسانية إلي: أ-التون ماي و دي الاجابه ب- أبراهام ماسلو ج- فريدريك تايلور د- مكليلان د", a: "أ-التون ماي و" },
        { q: "سؤال ثاني/2- تهتم المنظمات بدراسة سلوكيات العاملين فيها لعدد من الاعتبارات منه: أ-وجود علاقة بين اتجاهات الفرد وسلوكه دي الاجابه ب-وجود علاقة بين سلوك الفرد وأسرت ه ج- وجود علاقة بين المجتمع والإنتاجية د-ليس شئ مما سبق", a: "أ-وجود علاقة بين اتجاهات الفرد وسلوكه" },
        { q: "سؤال ثاني/3- يتطلب دراسة السلوك التنظيمي البحث العلمي في مجالات: أ-علم اتخاذ القرارات ب-علم التاريخ ج-علم النفس دي الاجابه د-علم الط ب", a: "ج-علم النفس" },
        { q: "سؤال ثاني/4- من دواعي الاهتمام بدراسة السلوك التنظيمي: أ-تعدد رغبات المتعاملين مع المنظمة واحتياجاتهم دي الاجابه ب-تعدد الوظائف الإدارية للمنظمة ج-تعدد أنواع قرارات المنظمة د-ليس شئ مما سبق", a: "أ-تعدد رغبات المتعاملين مع المنظمة واحتياجاتهم" },
        { q: "سؤال ثاني/5- علم النفس هو العلم الذي: أ-يدرس المجتمعات خصوصا البدائية منها لمعرفة الإنسان ونشاطاته ب-يدرس الناس في علاقاتهم بالأشخاص الآخرين ج-يفسر كيف ولماذا يتصرف الأفراد في نشاطات المجموعات د-يسعي لدراسة وقياس وتفسير وأحيانا تغير سلوك الفرد دي الاجابه", a: "د-يسعي لدراسة وقياس وتفسير وأحيانا تغير سلوك الفرد" },
        { q: "المحاضره الثانيه - 1- علم النفس الصناعي هو أحد فروع علم النفس إذ يغلب عليه الجانب التطبيقي .", a: "صح" },
        { q: "المحاضره الثانيه - 2- علم النفس الصناعي لا يفيد في الوقوف على مشكلات العاملين ورفع الروح المعنوية )x( .", a: "خطأ" },
        { q: "المحاضره الثانيه - 3- من أهداف علم النفس الصناعي زيادة توافق العامل مع عمله .", a: "صح" },
        { q: "المحاضره الثانيه - 4- الهندسة البشرية ليست فرع حديث من فروع علم النفس الصناعي )x( .", a: "خطأ" },
        { q: "المحاضره الثانيه - 5- علم النفس الصناعي لا يعني في المقام الأول بتوجيه الفرد للعمل الذي يتوائم مع قدراته وينسجم مع بنائه النفسي )x( .", a: "خطأ" },
        { q: "المحاضره الثانيه - سؤال ثاني/1- من أهم مجالات علم النفس الصناعي: أ-الاختيار والتوجه المهني ب-التدريب المهني ج- الهندسة البشرية د-كل ما سبق دي الاجابه", a: "د-كل ما سبق" },
        { q: "المحاضره الثانيه - سؤال ثاني/2- من أهداف علم النفس الصناعي: ا-زيادة توافق العامل في عمله دي الاجابه ب-التدريب المهني ج-زيادة عملية الاتصال د-ليس شئ مما سبق", a: "ا-زيادة توافق العامل في عمله" },
        { q: "المحاضره الثانيه - سؤال ثاني/3- من الاعتبارات التي بنيت عليها أهمية السلوك التنظيمي: ا-العلاقة بين بيئة العمل الداخلية وإنتاجية العمل دي الاجابه ب-العلاقة بين بيئة العمل الخارجية وإنتاجية العمل ج-العلاقة بين المنافسين وإنتاجية الموظف د-العلاقة بين العملاء وإنتاجية الموظف", a: "ا-العلاقة بين بيئة العمل الداخلية وإنتاجية العمل" },
        { q: "المحاضره الثانيه - سؤال ثاني/4- عندما ندرك السلوك الإنساني فإننا نقول أن الإنسان: ا-كائن فطري ب-كائن قلق ومتوتر ج-كائن معقد دي الاجابه د- ليس شئ مما سبق", a: "ج-كائن معقد" },
        { q: "المحاضره الثانيه - سؤال ثاني/5- يحرص علم النفس الصناعي علي: أ-كرامة واحترام العاملين ب-الراحة النفسية والصحية ج-زيادة الانتاجية د-كل ما سبق دي الاجابه", a: "د-كل ما سبق" },
        { q: "المحاضره الثالثة - 1- البيئة ليس لها دور في تكوين الشخصية )×( البيئة لها دور مهم في التعلم", a: "×" },
        { q: "المحاضره الثالثة - 2- نظرية السمات تهتم بالفروق الفردية بين الأفراد )√", a: "√" },
        { q: "المحاضره الثالثة - 3- السمات الثانوية تظهر في كل المواقف )×( تظهر في مواقف معينة", a: "×" },
        { q: "المحاضره الثالثة - 4- مفهوم الذات يؤثر علي دافعية الفرد للعمل )√", a: "√" },
        { q: "المحاضره الثالثة - 5- الشخصية بالكامل تتغير من يوم لأخر )×( الشخصية ثابتة نسبيا وليست متغيرة بالكامل", a: "×" },
        { q: "المحاضره الثالثة - سؤال ثاني/1- سمة التي تسيطر علي معظم سلوك الفرد تسمي: ا-سمة ثانوية ب-سمة رئيسية دي الاجابه ج-سمة مركزية د-كل ما سبق", a: "ب-سمة رئيسية" },
        { q: "المحاضره الثالثة - سؤال ثاني/2- تعتمد نظرية الأنماط الفسيولوجية للشخصية علي بعدين أساسين: أ-نمط الشخصية الانطوائية ب-نمط الشخصية الاستنباطية ج-أ و ب دي الاجابه د-ليس شئ مما سبق", a: "ج-أ و ب" },
        { q: "المحاضره الثالثة - سؤال ثاني/3- صاحب نظرية السمات هو: أ-البورت دي الاجابه ب-فرويد ج-ماسلو د-ليس شئ مما سبق", a: "أ-البورت" },
        { q: "المحاضره الثالثة - سؤال ثاني/4- نظرية الذات ترتبط بعالم النفس: أ-فرويد ب-ماسلو ج-كارل دي الاجابه د-واتسون", a: "ج-كارل" },
        { q: "المحاضره الثالثة - سؤال ثاني/5- تقدير الذات المرتفع يؤدي إلي: أ-زيادة الثقة بالنفس دي الاجابه ب-ضعف الأداء ج-تجنب المسئولية د-ليس شئ مما سبق", a: "أ-زيادة الثقة بالنفس" },
        { q: "المحاضره الرابعة - 1- الدوافع هي قوه خارجيه فقط تؤثر على سلوك الفرد . خطأ", a: "خطأ" },
        { q: "المحاضره الرابعة - 2- حسب نظريه ماسلو لا يمكن الانتقال لمستوى اعلى قبل اشباع المستوى الادنى. صح", a: "صح" },
        { q: "المحاضره الرابعة - 3- زياده المرتب دائما يؤدي الى تحفيز قوي طويل الامد . خطأ", a: "خطأ" },
        { q: "المحاضره الرابعة - 4- دافع الانجاز من اهم دوافع نظرية ميكلاند . صح", a: "صح" },
        { q: "المحاضره الرابعة - 5- الحب والانتماء تعتبر من حاجات التقدير . خطأ", a: "خطأ" },
        { q: "المحاضره الرابعة - سؤال ثاني/1- اي مما يلي يعد من العوامل المحفزه عند هرز برج الاجابه هي التقدير", a: "التقدير" },
        { q: "المحاضره الرابعة - سؤال ثاني/2- الحاجه الى الاحترام من هرم ماسلو تاتي في المرتبه الاجابه هي الرابعه", a: "الرابعه" },
        { q: "المحاضره الرابعة - سؤال ثاني/3- الشخص الذي يسعى للتاثير والسيطره يمتلك دافع الاجابه هي القوه", a: "القوه" },
        { q: "المحاضره الرابعة - سؤال ثاني/4- اي من العوامل التاليه اذا غاب بسبب عدم رضا الموظف ولكن وجوده لا يزيد الرضا الاجابه هي المكافات الماليه", a: "المكافات الماليه" },
        { q: "المحاضره الرابعة - سؤال ثاني/5- اذا شعر الموظف ان جهده لن يؤدي الى مكافاه فان دافعيته ستكون الاجابه هي منخفضه", a: "منخفضه" },
        { q: "المحاضره الخامسه - 1- القيم تساعد في توجيه سلوك الافراد داخل المجتمع الاجابه صح", a: "صح" },
        { q: "المحاضره الخامسه - 2- القيم لا تؤثر في اتخاذ القرارات الاجابه خطا", a: "خطا" },
        { q: "المحاضره الخامسه - 3- ضعف التربيه الاسريه قد يؤدي الى تدهور القيم في المجتمع الاجابه صح", a: "صح" },
        { q: "المحاضره الخامسه - 4- القيم تساعد في زياده الاستقرار في المجتمع الاجابه صح", a: "صح" },
        { q: "المحاضره الخامسه - 5- القيم الاقتصاديه تهتم بالجمال والتنظيم الاجابه خاطئه", a: "خاطئه" },
        { q: "المحاضره الخامسه - سؤال ثاني/1- القيم هي : الاجابه هي معتقدات ومبادئ توجه سلوك الفرد", a: "معتقدات ومبادئ توجه سلوك الفرد" },
        { q: "المحاضره الخامسه - سؤال ثاني/2- من اسباب تردي القيم في المجتمع الاجابه هي ضعف دور الاسره", a: "ضعف دور الاسره" },
        { q: "المحاضره الخامسه - سؤال ثاني/3- من العوامل التي تساعد على انخفاض القيم في المجتمع الاجابه هي رفقاء السوء", a: "رفقاء السوء" },
        { q: "المحاضره الخامسه - سؤال ثاني/4- من نتائج الالتزام بالقيم في المجتمع الاجابه هي زياده التماسك الاجتماعي", a: "زياده التماسك الاجتماعي" },
        { q: "المحاضره الخامسه - سؤال ثاني/5- القيم التي تهتم بالعلاقه الانسانيه الاجابه هي القيم الاجتماعيه", a: "القيم الاجتماعيه" }
    ];

    const resultsContainer = document.getElementById('results');
    const searchInput = document.getElementById('searchInput');
    const counter = document.getElementById('counter');
    const themeToggle = document.getElementById('themeToggle');

    // تبديل الثيم
    themeToggle.addEventListener('click', () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeToggle.innerText = isDark ? 'الوضع الليلي 🌙' : 'الوضع النهاري ☀️';
    });

    function normalize(text) {
        return text.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').toLowerCase();
    }

    function render(list) {
        resultsContainer.innerHTML = '';
        counter.innerText = `عدد الأسئلة المعروضة: ${list.length}`;
        
        if(list.length === 0) {
            resultsContainer.innerHTML = `<div class="no-results">❌ مفيش سؤال بالاسم ده.. جرب كلمة تانية</div>`;
            return;
        }

        list.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'qa-card';

            let answer = item.a || 'غير محددة';
            if (answer.trim() === 'صح') {
                answer = '✅ صح';
            } else if (answer.trim() === 'خطأ') {
                answer = '❌ خطأ';
            }

            card.innerHTML = `
                <div class="question">${item.q}</div>
                <div class="answer-container" style="display:block;">${answer}</div>
            `;
            resultsContainer.appendChild(card);
        });
    }

    // لا حاجة لزر الإظهار/الإخفاء بعد الآن

    searchInput.addEventListener('input', (e) => {
        const val = normalize(e.target.value);
        const filtered = data.filter(item => normalize(item.q).includes(val));
        render(filtered);
    });

    // تشغيل أول مرة
    render(data);
</script>

</body>
</html>
